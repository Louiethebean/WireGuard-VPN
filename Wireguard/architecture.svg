<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6b7c"/>
    </marker>
  </defs>
  <rect width="800" height="260" fill="#0f1620"/>
  <text x="400" y="32" text-anchor="middle" fill="#e8edf2" font-size="18" font-weight="600">WireGuard VPN — Encrypted Tunnel Flow</text>

  <g font-size="13" fill="#0f1620">
    <rect x="40" y="90" width="170" height="70" rx="10" fill="#48cae4"/>
    <text x="125" y="115" text-anchor="middle" font-weight="600">Client Device</text>
    <text x="125" y="133" text-anchor="middle">wg0 interface</text>

    <rect x="300" y="90" width="200" height="70" rx="10" fill="#0096c7"/>
    <text x="400" y="115" text-anchor="middle" font-weight="600" fill="#fff">Encrypted Tunnel</text>
    <text x="400" y="133" text-anchor="middle" fill="#fff">UDP, Curve25519</text>

    <rect x="590" y="90" width="170" height="70" rx="10" fill="#023e8a"/>
    <text x="675" y="115" text-anchor="middle" font-weight="600" fill="#fff">VPN Server</text>
    <text x="675" y="133" text-anchor="middle" fill="#fff">Routes to LAN</text>
  </g>

  <line x1="210" y1="125" x2="298" y2="125" stroke="#5b6b7c" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="125" x2="588" y2="125" stroke="#5b6b7c" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="400" y="210" text-anchor="middle" fill="#8a99a8" font-size="12">Public/private keypairs authenticate peers — all traffic between client and server is encrypted end-to-end</text>
</svg>
